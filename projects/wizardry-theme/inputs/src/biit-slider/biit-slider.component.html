<div class="slider">
  <input #ranger type="range"
    [(ngModel)]="value"
    (ngModelChange)="onChange(ranger.value);"
    [min]="min"
    [max]="max"
    [step]="step"
    (input)="progressScript()"
    (pointerdown)="tooltipBoxVisible = true"
    (pointerup)="tooltipBoxVisible = false"
    >
  <div #tooltip class="tooltip" [style.opacity]="tooltipBoxVisible && showTooltip ? '100%' : '0%'"></div>
  <div class="ticks">
    @for (tick of [].constructor(ticks); track tick; let i = $index) {
      <span
        [class.no-labels]="!labels.length"
        (click)="updateValue(i)">
        {{labels[i]}}
      </span>
    }
  </div>
</div>
