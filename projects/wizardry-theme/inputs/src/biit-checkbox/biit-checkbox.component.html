<label [class.disabled]="disabled" id="biit-checkbox" class="biit-checkbox">
  <input [attr.id]="checked?'checked':'unchecked'"
    type="checkbox"
    class="checkbox-box"
    [ngModel]="checked"
    (ngModelChange)="onModelChange($event)"
    [disabled]="disabled"/>
  <div>
    <div>
      <a>
        <ng-content></ng-content>
      </a>
      @if (description && !showAlwaysDescription) {
        <biit-tooltip-icon inline [text]="description"/>
      }
    </div>
    @if (description && showAlwaysDescription) {
      <span class="description">{{ description }}</span>
    }
  </div>
</label>
