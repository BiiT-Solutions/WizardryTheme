<div class="slider-vertical">
  <input #rangerVer type="range"
    orient="vertical"
    class="vertical"
    [class.inverted]="inverted"
    [ngModel]="index"
    (ngModelChange)="onChange(this.data[rangerVer.value].value);"
    [min]="0"
    [max]="data.length - 1"
    [step]="1"
    (input)="progressScript()"
    (pointerdown)="tooltipBoxVisible = true"
    (pointerup)="tooltipBoxVisible = false"
    >

  <div class="ticks vertical">
    <div #tooltip class="tooltip-slider" [style.opacity]="tooltipBoxVisible && showTooltip ? '100%' : '0%'"></div>
    @for (tick of $any(data); track tick; let i = $index; let c = $count) {
      <div
        class="tick"
        [class.hide-tick]="!(!inverted ? data[i] : data[c-i-1]).label"
        >
        <span></span>
        <div class="label" [class.show-desc]="showDescription"
          (click)="value = (!inverted ? data[i] : data[c-i-1]).value; onChange((!inverted ? data[i] : data[c-i-1]).value)">
          <span>
            {{(!inverted ? data[i] : data[c-i-1]).label}}
          </span>
          @if (showDescription) {
            <span class="description">
              {{(!inverted ? data[i] : data[c-i-1]).description}}
            </span>
          }
          @if ((!inverted ? data[i] : data[c-i-1]).description && !showDescription) {
            <biit-tooltip-icon
              [text]="(!inverted ? data[i] : data[c-i-1]).description"
            ></biit-tooltip-icon>
          }
        </div>
      </div>
    }
  </div>
</div>
