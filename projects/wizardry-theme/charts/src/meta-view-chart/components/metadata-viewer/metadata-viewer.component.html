<div class="metadata-view" id="metaviewer-data">
  <div class="metadata-header" id="metaviewer-header" [class.justify-center]="!titleField">
    <div class="data-icon">
      <biit-meta-element id="metaviewer-element"
        [styles]="_data.styles"
        [classes]="_data.classes"
        [icon]="_data.icon"
        >
        @if (_data.custom) {
          <div [innerHTML]="_data.custom.innerHTML"></div>
        }
      </biit-meta-element>
    </div>
    @if (titleField) {
      <div class="data-title" id="title" [tooltip]="_data.data[titleField] | printf">
        {{_data.data[titleField] | printf}}
      </div>
    }
    <div>
      <button biit-icon id="close-button"
        [icon]="'cross_wide'"
        (click)="close()"
      ></button>
    </div>
  </div>
  <div class="metadata-info" id="metaviewer-info">
    @for (field of (fields | removeFromArray: [titleField]) ; track field) {
      <div class="field">
        <div class="metadata-info-row" id="metaviewer-info-row">
          <div class="field-value" id="field">
            <biit-input-text
              [placeholder]="field"
              [ngModel]="_data.data[field] | autoFormat"
              [readonly]="true"
              />
          </div>
        </div>
      </div>
    }
  </div>
</div>
