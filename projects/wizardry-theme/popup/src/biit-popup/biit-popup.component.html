@if (type !== Type.INFO_BOX) {
  <div [class.dark-bg]="background" class="popup-background"
    (click)="closableOutside ? onClosed.emit() : false">
  </div>
}
<div #popup id="biit-popup"
  [class.popup-canvas]="type == Type.DEFAULT"
  [class.sixty-canvas]="type == Type.SIXTY"
  [class.info-box-canvas]="type == Type.INFO_BOX"
  [ngStyle]="type == Type.INFO_BOX ? {top: coordinates.y, left: coordinates.x} : undefined">
  @if (header) {
    <div id="header"
      class="header">
      <div class="title">
        <a>{{ title }}</a>
      </div>
      <div class="bar"></div>
      @if (closable) {
        <biit-icon id="popup-x-button"
          class="close"
          [name]="'cross_wide'"
          [pathStyle]="{fill: 'var(--popup-close-button)'}"
          (click)="onClosed.emit()"
        ></biit-icon>
      }
    </div>
  }
  <div class="content" id="content">
    <ng-container *ngTemplateOutlet="content"></ng-container>
  </div>
</div>

<ng-template #content>
  <ng-content></ng-content>
</ng-template>
